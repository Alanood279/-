<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Master - تعلم الإنجليزية</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Nunito:wght@400;600;700;800;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00C853;
            --primary-dark: #009624;
            --secondary: #FFAB00;
            --secondary-dark: #FF6D00;
            --accent: #2979FF;
            --danger: #FF1744;
            --purple: #D500F9;
            --dark: #1a1a2e;
            --light: #f8f9fa;
        }

        body {
            font-family: 'Tajawal', 'Nunito', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 100px rgba(0,0,0,0.3);
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 30px rgba(0,200,83,0.4);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 900;
            color: white;
            font-size: 1.4rem;
        }

        .owl-mascot {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            animation: bounce 2s infinite;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .stats {
            display: flex;
            gap: 15px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 800;
            color: white;
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 20px;
        }

        /* Navigation */
        .nav-tabs {
            display: flex;
            background: white;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }

        .nav-tab {
            flex: 1;
            padding: 18px;
            text-align: center;
            cursor: pointer;
            font-weight: 800;
            color: #bbb;
            transition: all 0.3s;
            position: relative;
        }

        .nav-tab.active {
            color: var(--primary);
        }

        .nav-tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20%;
            right: 20%;
            height: 3px;
            background: var(--primary);
            border-radius: 3px;
        }

        /* Path Container */
        .path-container {
            padding: 30px 20px;
            background: linear-gradient(180deg, #f0f4f8 0%, #ffffff 100%);
            min-height: calc(100vh - 140px);
        }

        .section-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 1.8rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        .level-path {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            position: relative;
            padding: 20px 0;
        }

        .path-line {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 100%;
            background: #e0e0e0;
            border-radius: 3px;
            z-index: 0;
        }

        .path-progress {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            background: linear-gradient(to bottom, var(--primary) 0%, var(--accent) 100%);
            border-radius: 3px;
            z-index: 1;
            transition: height 0.5s ease;
        }

        .level-wrapper {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }

        .level-node {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.4rem;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            border: 4px solid;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .level-node:hover:not(.locked) {
            transform: scale(1.15);
        }

        .level-node.locked {
            background: #e0e0e0;
            border-color: #bdbdbd;
            color: #757575;
            cursor: not-allowed;
        }

        .level-node.available {
            background: white;
            border-color: var(--primary);
            color: var(--primary);
            animation: pulse 2s infinite;
        }

        .level-node.completed {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-color: var(--primary-dark);
            color: white;
        }

        .level-node.current {
            background: linear-gradient(135deg, var(--secondary) 0%, var(--secondary-dark) 100%);
            border-color: var(--secondary-dark);
            color: white;
            animation: bounce 1s infinite;
            transform: scale(1.2);
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0,200,83,0.4); }
            50% { box-shadow: 0 0 0 15px rgba(0,200,83,0); }
        }

        .level-label {
            position: absolute;
            right: 100px;
            background: white;
            padding: 10px 20px;
            border-radius: 15px;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--dark);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            white-space: nowrap;
        }

        .level-label::after {
            content: '';
            position: absolute;
            left: -8px;
            top: 50%;
            transform: translateY(-50%);
            border: 8px solid transparent;
            border-right-color: white;
        }

        .stars {
            position: absolute;
            bottom: -5px;
            display: flex;
            gap: 2px;
            font-size: 12px;
        }

        /* Game Screen */
        .game-screen {
            display: none;
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            flex-direction: column;
        }

        .game-header {
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255,255,255,0.9);
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }

        .back-btn {
            width: 45px;
            height: 45px;
            border-radius: 15px;
            border: none;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            transition: all 0.3s;
        }

        .back-btn:hover {
            transform: scale(1.1);
        }

        .progress-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .progress-bar {
            height: 12px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary) 0%, var(--accent) 100%);
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .progress-text {
            font-size: 0.85rem;
            color: #666;
            font-weight: 700;
            text-align: center;
        }

        .hearts {
            display: flex;
            gap: 5px;
        }

        .heart {
            font-size: 24px;
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .game-content {
            flex: 1;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .question-card {
            background: white;
            border-radius: 30px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .word-image-container {
            width: 150px;
            height: 150px;
            margin: 0 auto 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 70px;
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .word-english {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--dark);
            margin-bottom: 10px;
            font-family: 'Nunito', sans-serif;
        }

        .word-pronunciation {
            font-size: 1rem;
            color: #888;
            margin-bottom: 30px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            width: 100%;
        }

        .option-btn {
            padding: 18px 25px;
            border: 3px solid #e0e0e0;
            background: white;
            border-radius: 15px;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--dark);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .option-btn:hover:not(.disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            border-color: var(--accent);
        }

        .option-btn.correct {
            background: linear-gradient(135deg, #00C853 0%, #00E676 100%);
            border-color: #00C853;
            color: white;
            animation: correctAnim 0.5s;
        }

        .option-btn.wrong {
            background: linear-gradient(135deg, #FF1744 0%, #FF5252 100%);
            border-color: #FF1744;
            color: white;
            animation: shake 0.5s;
        }

        @keyframes correctAnim {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .option-btn.disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        .option-btn.highlight-correct {
            background: linear-gradient(135deg, #00C853 0%, #00E676 100%);
            border-color: #00C853;
            color: white;
            animation: pulse 1s infinite;
        }

        /* Feedback Overlay */
        .feedback-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.3s;
        }

        .feedback-modal {
            background: white;
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            max-width: 350px;
            width: 90%;
            animation: popIn 0.4s;
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .feedback-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .feedback-text {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 10px;
        }

        .feedback-subtext {
            color: #666;
            margin-bottom: 25px;
            font-size: 1.1rem;
        }

        .continue-btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
        }

        .continue-btn.correct {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
        }

        .continue-btn.wrong {
            background: linear-gradient(135deg, var(--danger) 0%, #D50000 100%);
            color: white;
        }

        /* Level Complete Screen */
        .level-complete {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            z-index: 2000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
        }

        .trophy {
            font-size: 120px;
            margin-bottom: 30px;
            animation: trophyAnim 2s infinite;
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.3));
        }

        @keyframes trophyAnim {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        .complete-title {
            font-size: 2.5rem;
            color: white;
            font-weight: 900;
            margin-bottom: 20px;
        }

        .complete-stats {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 25px;
            margin-bottom: 30px;
            width: 100%;
            max-width: 300px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
        }

        .stat-row:last-child {
            margin-bottom: 0;
            font-size: 1.4rem;
            color: #FFD700;
        }

        .home-btn {
            background: white;
            color: #764ba2;
            border: none;
            padding: 20px 60px;
            border-radius: 15px;
            font-size: 1.3rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 6px 0 rgba(0,0,0,0.2);
            transition: all 0.3s;
        }

        .home-btn:active {
            transform: translateY(6px);
            box-shadow: none;
        }

        /* Retry Button */
        .retry-btn {
            background: linear-gradient(135deg, var(--secondary) 0%, var(--secondary-dark) 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(255,171,0,0.4);
        }

        .retry-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255,171,0,0.6);
        }

        /* Celebration */
        .celebration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
            display: none;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            animation: confetti-fall 3s linear forwards;
        }

        @keyframes confetti-fall {
            0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Main Screen -->
        <div id="mainScreen" class="main-screen">
            <div class="header">
                <div class="logo">
                    <div class="owl-mascot">🦉</div>
                    <span>Word Master</span>
                </div>
                <div class="stats">
                    <div class="stat-item">
                        <span>🔥</span>
                        <span id="streakCount">12</span>
                    </div>
                    <div class="stat-item">
                        <span>💎</span>
                        <span id="gemCount">450</span>
                    </div>
                </div>
            </div>

            <div class="nav-tabs">
                <div class="nav-tab active" onclick="switchTab(this, 'path')">المسار</div>
                <div class="nav-tab" onclick="switchTab(this, 'leaderboard')">المتصدرون</div>
                <div class="nav-tab" onclick="switchTab(this, 'quests')">المهام</div>
                <div class="nav-tab" onclick="switchTab(this, 'profile')">أنا</div>
            </div>

            <div class="path-container" id="pathContainer">
                <div class="section-header">
                    <h2 class="section-title">رحلة التعلم</h2>
                    <p style="color: #666; margin-top: 10px;">اضغط على أي مرحلة لإعادة لعبها</p>
                </div>
                <div class="level-path" id="levelPath">
                    <!-- Levels generated by JS -->
                </div>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="gameScreen" class="game-screen">
            <div class="game-header">
                <button class="back-btn" onclick="exitGame()">✕</button>
                <div class="progress-container">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                    </div>
                    <div class="progress-text" id="progressText">1 / 10</div>
                </div>
                <div class="hearts">
                    <span class="heart">❤️</span>
                    <span class="heart">❤️</span>
                    <span class="heart">❤️</span>
                </div>
            </div>

            <div class="game-content">
                <div class="question-card" id="questionCard">
                    <div class="word-image-container" id="wordImage">📚</div>
                    <div class="word-english" id="wordEnglish">Loading...</div>
                    <div class="word-pronunciation" id="wordPronunciation">/ˈləʊdɪŋ/</div>
                    
                    <div class="options-grid" id="optionsGrid">
                        <!-- Options generated by JS -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Feedback Overlay -->
        <div class="feedback-overlay" id="feedbackOverlay">
            <div class="feedback-modal" id="feedbackModal">
                <div class="feedback-icon" id="feedbackIcon">🎉</div>
                <div class="feedback-text" id="feedbackText">أحسنت!</div>
                <div class="feedback-subtext" id="feedbackSubtext">إجابة صحيحة</div>
                <button class="continue-btn correct" id="continueBtn" onclick="handleContinue()">استمر</button>
                <button class="retry-btn" id="retryBtn" onclick="retryQuestion()" style="display: none;">حاول مرة أخرى</button>
            </div>
        </div>

        <!-- Level Complete Screen -->
        <div class="level-complete" id="levelComplete">
            <div class="trophy">🏆</div>
            <h2 class="complete-title">اكتملت المرحلة!</h2>
            <div class="complete-stats">
                <div class="stat-row">
                    <span>الإجابات الصحيحة:</span>
                    <span id="correctAnswers">10/10</span>
                </div>
                <div class="stat-row">
                    <span>المحاولات:</span>
                    <span id="totalAttempts">12</span>
                </div>
                <div class="stat-row">
                    <span>الإجمالي:</span>
                    <span id="totalXP">100 XP</span>
                </div>
            </div>
            <button class="home-btn" onclick="returnToHome()">العودة للرئيسية</button>
        </div>

        <!-- Celebration -->
        <div class="celebration" id="celebration"></div>
    </div>

    <script>
        // Generate 50 levels with 10 words each (500 words total)
        const vocabulary = [];
        const baseEmojis = ["📚", "💪", "🎯", "🌟", "🎨", "🚀", "💡", "🔥", "⚡", "🎭", "🌈", "💎", "🏆", "🎪", "🎬", "🎮", "🎲", "🎸", "🎺", "🎨"];

            { en: "ahead", ar: "أمام" }, { en: "air", ar: "هواء" }, { en: "all", ar: "كل" },
            { en: "allow", ar: "يسمح" }, { en: "almost", ar: "تقريباً" }, { en: "alone", ar: "وحيد" },
            { en: "along", ar: "على طول" }, { en: "already", ar: "بالفعل" }, { en: "also", ar: "أيضاً" },
            { en: "although", ar: "على الرغم من" }, { en: "always", ar: "دائماً" }, { en: "American", ar: "أمريكي" },

            { en: "answer", ar: "إجابة" }, { en: "any", ar: "أي" }, { en: "anyone", ar: "أي شخص" },
            { en: "anything", ar: "أي شيء" }, { en: "appear", ar: "يظهر" }, { en: "apply", ar: "يطبق" },

            { en: "nothing", ar: "لا شيء" }, { en: "notice", ar: "يلاحظ" }, { en: "now", ar: "الآن" },
            { en: "number", ar: "رقم" }
        ];

        // Generate 50 levels with 10 words each
        for (let i = 0; i < 50; i++) {
            const levelWords = [];
            for (let j = 0; j < 10; j++) {
                const wordIndex = i * 10 + j;
                if (wordIndex < wordTemplates.length) {
                    levelWords.push({
                        ...wordTemplates[wordIndex],
                        emoji: baseEmojis[j % baseEmojis.length]
                    });
                }
            }
            vocabulary.push(levelWords);
        }

        let currentLevel = 0;
        let currentQuestion = 0;
        let score = 0;
        let correctCount = 0;
        let attempts = 0;
        let isRetry = false;
        let gameProgress = JSON.parse(localStorage.getItem('wordMasterProgress')) || { 
            currentLevel: 0, 
            completedLevels: [],
            stars: {} 
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderLevels();
        });

        function renderLevels() {
            const pathContainer = document.getElementById('levelPath');
            pathContainer.innerHTML = '<div class="path-line"></div>';
            
            const maxCompleted = Math.max(...gameProgress.completedLevels, -1);
            const progressHeight = ((maxCompleted + 1) / vocabulary.length) * 100;
            
            const progressLine = document.createElement('div');
            progressLine.className = 'path-progress';
            progressLine.style.height = progressHeight + '%';
            progressLine.style.top = '0';
            pathContainer.appendChild(progressLine);

            vocabulary.forEach((level, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'level-wrapper';
                
                const node = document.createElement('div');
                node.className = 'level-node';
                
                const isCompleted = gameProgress.completedLevels.includes(index);
                const isCurrent = index === gameProgress.currentLevel;
                const isAvailable = index <= gameProgress.currentLevel;
                
                if (isCompleted) {
                    node.classList.add('completed');
                    node.innerHTML = '✓';
                } else if (isCurrent) {
                    node.classList.add('current');
                    node.innerHTML = index + 1;
                } else if (isAvailable) {
                    node.classList.add('available');
                    node.innerHTML = index + 1;
                } else {
                    node.classList.add('locked');
                    node.innerHTML = '🔒';
                }
                
                // Allow playing any available or completed level
                if (isAvailable || isCompleted) {
                    node.onclick = () => startLevel(index);
                }
                
                const label = document.createElement('div');
                label.className = 'level-label';
                label.textContent = `مرحلة ${index + 1}`;
                
                // Add stars for completed levels
                if (isCompleted) {
                    const stars = document.createElement('div');
                    stars.className = 'stars';
                    const starCount = gameProgress.stars[index] || 3;
                    stars.innerHTML = '⭐'.repeat(starCount);
                    node.appendChild(stars);
                }
                
                wrapper.appendChild(node);
                wrapper.appendChild(label);
                pathContainer.appendChild(wrapper);
            });
        }

        function startLevel(levelIndex) {
            currentLevel = levelIndex;
            currentQuestion = 0;
            score = 0;
            correctCount = 0;
            attempts = 0;
            isRetry = false;
            
            document.getElementById('mainScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'flex';
            
            loadQuestion();
        }

        function loadQuestion() {
            const word = vocabulary[currentLevel][currentQuestion];
            const progress = ((currentQuestion) / vocabulary[currentLevel].length) * 100;
            
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('progressText').textContent = `${currentQuestion + 1} / ${vocabulary[currentLevel].length}`;
            document.getElementById('wordImage').textContent = word.emoji;
            document.getElementById('wordEnglish').textContent = word.en;
            document.getElementById('wordPronunciation').textContent = `/${word.en.toLowerCase()}/`;

            // Generate options
            const options = generateOptions(word);
            const grid = document.getElementById('optionsGrid');
            grid.innerHTML = '';

            options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = option.ar;
                btn.onclick = () => checkAnswer(option, word, btn);
                grid.appendChild(btn);
            });

            // Reset card animation
            const card = document.getElementById('questionCard');
            card.style.animation = 'none';
            setTimeout(() => card.style.animation = 'slideUp 0.5s ease', 10);
        }

        function generateOptions(correctWord) {
            const options = [correctWord];
            const allWords = vocabulary.flat();
            
            while (options.length < 4) {
                const random = allWords[Math.floor(Math.random() * allWords.length)];
                if (!options.find(o => o.ar === random.ar)) {
                    options.push(random);
                }
            }
            
            return options.sort(() => Math.random() - 0.5);
        }

        function checkAnswer(selected, correct, btnElement) {
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(btn => btn.classList.add('disabled'));
            
            attempts++;

            if (selected.en === correct.en) {
                // Correct answer
                btnElement.classList.add('correct');
                if (!isRetry) {
                    correctCount++;
                    score += 10;
                }
                showFeedback(true, correct);
            } else {
                // Wrong answer - show correct answer and allow retry
                btnElement.classList.add('wrong');
                
                // Highlight correct answer
                buttons.forEach(btn => {
                    if (btn.textContent === correct.ar) {
                        btn.classList.add('highlight-correct');
                    }
                });
                
                showFeedback(false, correct);
            }
        }

        function showFeedback(isCorrect, correctWord) {
            const overlay = document.getElementById('feedbackOverlay');
            const modal = document.getElementById('feedbackModal');
            const icon = document.getElementById('feedbackIcon');
            const text = document.getElementById('feedbackText');
            const subtext = document.getElementById('feedbackSubtext');
            const continueBtn = document.getElementById('continueBtn');
            const retryBtn = document.getElementById('retryBtn');

            overlay.style.display = 'flex';
            
            if (isCorrect) {
                modal.className = 'feedback-modal correct';
                icon.textContent = '🎉';
                text.textContent = 'أحسنت!';
                subtext.textContent = isRetry ? 'إجابة صحيحة بعد المحاولة!' : 'إجابة صحيحة من أول مرة! +10 نقاط';
                continueBtn.className = 'continue-btn correct';
                continueBtn.textContent = 'استمر';
                continueBtn.style.display = 'block';
                retryBtn.style.display = 'none';
                createConfetti();
                isRetry = false;
            } else {
                modal.className = 'feedback-modal wrong';
                icon.textContent = '💪';
                text.textContent = 'لا بأس!';
                subtext.textContent = `الإجابة الصحيحة هي: ${correctWord.ar}`;
                continueBtn.style.display = 'none';
                retryBtn.style.display = 'block';
                isRetry = true;
            }
        }

        function retryQuestion() {
            document.getElementById('feedbackOverlay').style.display = 'none';
            document.getElementById('celebration').style.display = 'none';
            document.getElementById('celebration').innerHTML = '';
            
            // Reload same question
            loadQuestion();
        }

        function handleContinue() {
            document.getElementById('feedbackOverlay').style.display = 'none';
            document.getElementById('celebration').style.display = 'none';
            document.getElementById('celebration').innerHTML = '';

            currentQuestion++;

            if (currentQuestion >= vocabulary[currentLevel].length) {
                completeLevel();
            } else {
                loadQuestion();
            }
        }

        function completeLevel() {
            // Calculate stars based on accuracy
            const accuracy = correctCount / vocabulary[currentLevel].length;
            let stars = 1;
            if (accuracy >= 0.7) stars = 2;
            if (accuracy >= 0.9) stars = 3;
            
            // Save progress
            if (!gameProgress.completedLevels.includes(currentLevel)) {
                gameProgress.completedLevels.push(currentLevel);
            }
            gameProgress.stars[currentLevel] = stars;
            gameProgress.currentLevel = Math.max(gameProgress.currentLevel, currentLevel + 1);
            localStorage.setItem('wordMasterProgress', JSON.stringify(gameProgress));

            document.getElementById('gameScreen').style.display = 'none';
            document.getElementById('levelComplete').style.display = 'flex';
            document.getElementById('correctAnswers').textContent = `${correctCount}/${vocabulary[currentLevel].length}`;
            document.getElementById('totalAttempts').textContent = attempts;
            document.getElementById('totalXP').textContent = `${score} XP`;
            
            createMassiveConfetti();
        }

        function returnToHome() {
            document.getElementById('levelComplete').style.display = 'none';
            document.getElementById('mainScreen').style.display = 'block';
            renderLevels();
        }

        function exitGame() {
            if (confirm('هل تريد الخروج من المرحلة؟')) {
                document.getElementById('gameScreen').style.display = 'none';
                document.getElementById('mainScreen').style.display = 'block';
            }
        }

        function createConfetti() {
            const container = document.getElementById('celebration');
            container.style.display = 'block';
            
            for (let i = 0; i < 30; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.backgroundColor = ['#00C853', '#FFAB00', '#2979FF', '#FF1744', '#D500F9'][Math.floor(Math.random() * 5)];
                confetti.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(confetti);
            }
        }

        function createMassiveConfetti() {
            const container = document.getElementById('celebration');
            container.style.display = 'block';
            
            for (let i = 0; i < 100; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.backgroundColor = ['#00C853', '#FFAB00', '#2979FF', '#FF1744', '#D500F9'][Math.floor(Math.random() * 5)];
                    confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    container.appendChild(confetti);
                }, i * 20);
            }
        }

        function switchTab(tab, section) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            
            if (section === 'path') {
                document.getElementById('pathContainer').style.display = 'block';
            } else {
                alert('قيد التطوير! 🚧');
            }
        }
    </script>
</body>
</html>
